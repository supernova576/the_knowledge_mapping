<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ project_name }} Canvas</title>
    {% include '_theme_init.html' %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='ico/obsidian-icon.ico') }}" />
</head>
<body>
<div class="container-fluid py-3">
    {% set active_page = 'projects' %}
    {% include '_navbar.html' %}
    <div class="d-flex justify-content-between align-items-center mb-2 px-2">
        <h1 class="h4 mb-0">{{ project_name }} · Canvas</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('project_detail', project_name=project_name) }}">Back</a>
            <button class="btn btn-outline-primary btn-sm" id="canvas-reset-view">Reset View</button>
        </div>
    </div>
    <div id="canvas-host" class="km-canvas-host" data-project-name="{{ project_name }}">
        <svg class="km-canvas-edges" xmlns="http://www.w3.org/2000/svg"><defs><marker id="km-arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" /></marker></defs><g id="canvas-edge-layer"></g></svg>
        <div id="canvas-node-layer"></div>
    </div>
    <div id="canvas-warning" class="small text-warning px-2 mt-2"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='js/project_canvas.js') }}"></script>
{% include '_theme_toggle_script.html' %}
</body>
</html>
