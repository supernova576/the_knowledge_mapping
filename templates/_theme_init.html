<script>
    (function () {
        const storageKey = "km-theme";
        const storedTheme = localStorage.getItem(storageKey);
        const preferredDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-bs-theme", storedTheme || (preferredDark ? "dark" : "light"));
    })();
</script>
