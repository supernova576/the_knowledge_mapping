<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found</title>
    <script>
      (function () {
        const storageKey = "km-theme";
        const storedTheme = localStorage.getItem(storageKey);
        const preferredDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-bs-theme", storedTheme || (preferredDark ? "dark" : "light"));
      })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='ico/obsidian-icon.ico') }}" />
</head>

<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
            <h1 class="h3 mb-0">The Knowledge Overview Dashboard</h1>
            <button id="theme-toggle" type="button" class="btn btn-outline-secondary">🌙 Dark mode</button>
        </div>

        <div class="card shadow-sm border-warning-subtle">
            <div class="card-body">
                <h2 class="h4 text-warning-emphasis">404 - Page Not Found</h2>
                <p class="mb-3">{{ error_message }}</p>
                <div class="d-flex gap-2 flex-wrap">
                    <a class="btn btn-primary" href="{{ url_for('index') }}">Back to dashboard</a>
                    <button class="btn btn-outline-secondary" onclick="history.back()">Go back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const storageKey = "km-theme";
            const root = document.documentElement;
            const toggle = document.getElementById("theme-toggle");

            function setTheme(theme) {
                root.setAttribute("data-bs-theme", theme);
                if (toggle) {
                    toggle.textContent = theme === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
                }
                localStorage.setItem(storageKey, theme);
            }

            const initialTheme = root.getAttribute("data-bs-theme") || "light";
            setTheme(initialTheme);

            if (toggle) {
                toggle.addEventListener("click", function () {
                    const current = root.getAttribute("data-bs-theme") || "light";
                    setTheme(current === "dark" ? "light" : "dark");
                });
            }
        })();
    </script>
</body>

</html>
